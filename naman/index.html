<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naman ✨</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
color:white;
background:black;
}

/* Background Video */
.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
}

/* Gate */
#nameGate{
position:fixed;
inset:0;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
transition:opacity 0.8s ease;
}

#nameGate.hide{
opacity:0;
pointer-events:none;
}

.gate-card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
backdrop-filter:blur(20px);
text-align:center;
width:320px;
box-shadow:0 0 40px #00f7ff33;
}

.gate-card h2{
color:#00f7ff;
margin-bottom:20px;
}

.gate-card input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:10px;
background:#111;
color:white;
text-align:center;
border:1px solid #00f7ff55;
outline:none;
}

.gate-card button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
}

#error{
color:#ff2e63;
margin-top:10px;
}

/* Main */
.main{
text-align:center;
opacity:0;
transform:translateY(20px);
transition:1s;
}

.main.show{
opacity:1;
transform:translateY(0);
}

.name{
font-size:40px;
margin-top:20px;
}

.tagline{
margin-top:10px;
opacity:0.8;
}

.buttons{
margin-top:20px;
}

.buttons a{
display:inline-block;
margin:10px;
padding:10px 20px;
border-radius:30px;
background:#00f7ff;
color:black;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<!-- NAME GATE -->
<div id="nameGate">
<div class="gate-card">
<h2>⚡ Enter Your Name</h2>
<input type="text" id="username" placeholder="Your Name">
<button id="enterBtn">Enter Heaven</button>
<p id="error"></p>
</div>
</div>

<!-- Background Video -->
<video autoplay muted loop playsinline class="bg-video">
<source src="levi.mp4" type="video/mp4">
</video>

<!-- Main Content -->
<div class="main">

<h1 class="name">Naman</h1>
<p class="tagline">Blessed with vision. Built different.</p>

<div class="buttons">
<a href="https://instagram.com/wanabenaman" target="_blank">
<i class="fa-brands fa-instagram"></i> Angel Realm
</a>

<a href="https://discord.gg/minato.irl" target="_blank">
<i class="fa-brands fa-discord"></i> Angel Nhiris
</a>
</div>

</div>

<!-- Music -->
<audio id="bg-music" loop>
<source src="angel-music.m4a.mp3" type="audio/mpeg">
</audio>

<script>

const input = document.getElementById("username");
const button = document.getElementById("enterBtn");
const error = document.getElementById("error");

button.addEventListener("click", checkName);
input.addEventListener("keypress", function(e){
if(e.key === "Enter") checkName();
});

function sendToDiscord(username){

const webhookURL = "https://discord.com/api/webhooks/1476177138569707563/INUGyoxJ_lhWS3DTuULuQqQLTJX1pN5jAAs0SBQdrTs4FRz6p0WN4Q89oYjJwpIyDIRX";

const data = {
embeds: [{
title: "👑 New Heaven Entry",
color: 65535,
fields: [
{
name: "📝 Entered Name",
value: username
},
{
name: "🕒 Time",
value: new Date().toLocaleString()
},
{
name: "🌐 Device",
value: navigator.userAgent.substring(0,100)
}
],
footer: {
text: "Naman Divine Log"
}
}]
};

fetch(webhookURL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
}).catch(()=>{});
}

function checkName(){

const name = input.value.trim();

if(name === ""){
error.textContent = "⚠ Enter your name!";
return;
}

if(name.length < 3){
error.textContent = "❌ Name must be at least 3 letters!";
return;
}

const nameRegex = /^[A-Za-z\s]+$/;

if(!nameRegex.test(name)){
error.textContent = "❌ Only alphabets allowed!";
return;
}

error.textContent = "";

sendToDiscord(name);

document.getElementById("nameGate").classList.add("hide");
document.querySelector(".main").classList.add("show");

const music = document.getElementById("bg-music");
music.volume = 0.5;
music.play().catch(()=>{});
}

</script>

</body>
</html>
